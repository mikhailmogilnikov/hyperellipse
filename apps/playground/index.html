<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hyperellipse playground</title>
    <style>
      body {
        margin: 0;
        font-family: system-ui, sans-serif;
        color: #eee;
        background: #0e0e10;
      }
      .split {
        display: grid;
        grid-template-columns: 1fr 1fr;
        height: 100vh;
      }
      iframe {
        width: 100%;
        height: 100%;
        border: none;
        border-right: 1px solid #333;
      }
    </style>
  </head>
  <body>
    <div class="split">
      <iframe src="/demo.html?mode=native" title="native"></iframe>
      <iframe src="/demo.html?mode=force" title="fallback"></iframe>
    </div>
  </body>
</html>
